<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001736"/>
      <stop offset="50%" style="stop-color:#0a2e5a"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6cf8bb"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Decorative orbs -->
  <circle cx="100" cy="100" r="300" fill="rgba(108,248,187,0.04)"/>
  <circle cx="1100" cy="500" r="250" fill="rgba(108,248,187,0.03)"/>
  <circle cx="400" cy="400" r="180" fill="rgba(108,248,187,0.02)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 50)">
    <rect width="48" height="48" rx="12" fill="url(#accent)"/>
    <text x="24" y="33" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#001736" text-anchor="middle">Z</text>
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6cf8bb">Zawadi</text>
  </g>

  <!-- Large Question Mark Decorative -->
  <text x="1060" y="200" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="rgba(108,248,187,0.06)" text-anchor="middle">?</text>

  <!-- Headline -->
  <text x="60" y="180" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Frequently Asked Questions
  </text>
  <text x="60" y="240" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.55)">
    Everything you need to know about finding scholarships
  </text>

  <!-- FAQ Cards -->
  <!-- Question 1 -->
  <g transform="translate(60, 300)">
    <rect width="520" height="55" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="25" cy="27" r="3" fill="#6cf8bb"/>
    <text x="40" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Do I need IELTS to apply?</text>
  </g>

  <!-- Question 2 -->
  <g transform="translate(60, 370)">
    <rect width="520" height="55" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="25" cy="27" r="3" fill="#6cf8bb"/>
    <text x="40" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Is Zawadi free for students?</text>
  </g>

  <!-- Question 3 -->
  <g transform="translate(60, 440)">
    <rect width="520" height="55" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="25" cy="27" r="3" fill="#6cf8bb"/>
    <text x="40" y="32" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">How does the matching engine work?</text>
  </g>

  <!-- Right side: Key stats -->
  <g transform="translate(640, 300)">
    <rect width="240" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="120" y="38" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#6cf8bb" text-anchor="middle">22+</text>
    <text x="120" y="62" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Answered Questions</text>
    <text x="120" y="82" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">Across 6 categories</text>
  </g>

  <g transform="translate(900, 300)">
    <rect width="240" height="100" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="120" y="38" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#6cf8bb" text-anchor="middle">3 min</text>
    <text x="120" y="62" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Profile Setup</text>
    <text x="120" y="82" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">See matches instantly</text>
  </g>

  <!-- Bottom Tagline Bar -->
  <rect x="0" y="535" width="1200" height="95" fill="rgba(108,248,187,0.04)"/>
  <line x1="60" y1="535" x2="1140" y2="535" stroke="rgba(108,248,187,0.1)" stroke-width="1"/>

  <circle cx="100" cy="580" r="4" fill="#6cf8bb"/>
  <text x="115" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">No IELTS Alternatives Explained</text>

  <circle cx="430" cy="580" r="4" fill="#6cf8bb"/>
  <text x="445" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">AI Essay Tool Deep Dive</text>

  <circle cx="760" cy="580" r="4" fill="#6cf8bb"/>
  <text x="775" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Subscription &amp; Data Privacy</text>

  <!-- URL -->
  <text x="920" y="615" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="end">techsari.online/faq</text>
</svg>
