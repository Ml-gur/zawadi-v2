<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001736"/>
      <stop offset="50%" style="stop-color:#0a2e5a"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6cf8bb"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Decorative orbs -->
  <circle cx="150" cy="150" r="320" fill="rgba(108,248,187,0.04)"/>
  <circle cx="1000" cy="500" r="280" fill="rgba(108,248,187,0.03)"/>
  <circle cx="600" cy="315" r="200" fill="rgba(108,248,187,0.02)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="white" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Logo -->
  <g transform="translate(60, 50)">
    <rect width="48" height="48" rx="12" fill="url(#accent)"/>
    <text x="24" y="33" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#001736" text-anchor="middle">Z</text>
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6cf8bb">Zawadi</text>
  </g>

  <!-- Headline -->
  <text x="60" y="190" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    Built for African Students,
  </text>
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="46" font-weight="bold" fill="white">
    by People Who <tspan fill="#6cf8bb">Get It</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.55)">
    No data selling. No spam. Just scholarships you actually qualify for.
  </text>

  <!-- Mission cards -->
  <g transform="translate(60, 340)">
    <rect width="340" height="110" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#6cf8bb">Our Mission</text>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Fix the scholarship access gap for</text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">the 1.2B people across 54 countries.</text>
  </g>

  <g transform="translate(430, 340)">
    <rect width="340" height="110" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#6cf8bb">What We Do</text>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">AI matches + human mentor review +</text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">deterministic eligibility engine.</text>
  </g>

  <g transform="translate(800, 340)">
    <rect width="340" height="110" rx="14" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#6cf8bb">Our Promise</text>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Your data stays yours. No ads, no</text>
    <text x="20" y="78" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">selling, no algorithmic ranking.</text>
  </g>

  <!-- Bottom Tagline Bar -->
  <rect x="0" y="535" width="1200" height="95" fill="rgba(108,248,187,0.04)"/>
  <line x1="60" y1="535" x2="1140" y2="535" stroke="rgba(108,248,187,0.1)" stroke-width="1"/>

  <circle cx="100" cy="580" r="4" fill="#6cf8bb"/>
  <text x="115" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Deterministic Engine</text>

  <circle cx="430" cy="580" r="4" fill="#6cf8bb"/>
  <text x="445" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Human Mentor Review</text>

  <circle cx="760" cy="580" r="4" fill="#6cf8bb"/>
  <text x="775" y="584" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">54 Countries Covered</text>

  <!-- URL -->
  <text x="920" y="615" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="end">techsari.online/about</text>
</svg>
